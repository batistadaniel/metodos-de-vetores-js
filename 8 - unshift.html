<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unShift</title>
</head>
<body>
  <script>
    let arr = [1, 2, 3];
    console.log(arr.unshift(0)); // 4
    console.log(arr); // [0, 1, 2, 3]
  </script>
</body>
</html>
