<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>splice</title>
</head>
<body>
  <script>
    let arr = [1, 2, 3, 4];
    console.log(arr.splice(1, 3)); // [2, 3, 4]
    console.log(arr); // [1]
  </script>
</body>
</html>
