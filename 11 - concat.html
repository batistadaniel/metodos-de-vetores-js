<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>concat</title>
</head>
<body>
  <script>
    let arr1 = [1, 2, 3];
    let arr2 = [4, 5, 6];
    console.log(arr1.concat(arr2)); // [1, 2, 3, 4, 5, 6]
    console.log(arr1); // [1, 2, 3]
  </script>
</body>
</html>
