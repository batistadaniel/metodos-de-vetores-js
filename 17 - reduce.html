<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reduce</title>
</head>
<body>
  <script>
    let arr = [1, 2, 3, 4];
    console.log(arr.reduce((soma, x) => soma + x, 0)); // 10
  </script>
</body>
</html>
